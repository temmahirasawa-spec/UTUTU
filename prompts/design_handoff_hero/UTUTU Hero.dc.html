<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&amp;family=Inter:wght@400;500;700;800&amp;family=JetBrains+Mono:wght@400;500&amp;family=Noto+Sans+JP:wght@400;500;700;900&amp;display=swap" rel="stylesheet">
<style>
  :root {
    --v: #5FD0A8;
    --v-glow: rgba(95,208,168,0.22);
    --bg: #0A0A0B;
    --bg-2: #0E0E10;
    --fg: #F4F2ED;
    --mid: rgba(244,242,237,0.62);
    --low: rgba(244,242,237,0.40);
    --line: rgba(244,242,237,0.10);
    --scrim: 0.30;
    --mark: 'Bricolage Grotesque','Helvetica Neue',sans-serif;
    --sans: 'Helvetica Neue',Helvetica,Arial,'Inter','Noto Sans JP',sans-serif;
    --jp: 'Noto Sans JP','Helvetica Neue',sans-serif;
    --mono: 'JetBrains Mono',monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  @keyframes hero-breath { from { transform: scale(1); } to { transform: scale(1.06); } }
</style>
</helmet>
<div ref="{{ setWrap }}" style="position:relative; width:100%; height:100vh; min-height:600px; background:var(--bg); color:var(--fg); font-family:var(--sans); overflow:hidden;">

  <!-- HERO IMAGE (placeholder for KV photo) -->
  <div style="position:absolute; inset:0; z-index:0; transform-origin:50% 30%;">
    <div style="position:absolute; inset:0; background:repeating-linear-gradient(45deg, #141416 0 14px, #0E0E10 14px 28px); filter:brightness(0.85) contrast(1.02); animation:hero-breath 60s ease-in-out infinite alternate;"></div>
    <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center;">
      <span style="font-family:var(--mono); font-size:12px; letter-spacing:0.22em; text-transform:uppercase; color:var(--low); padding:10px 16px; border:1px solid var(--line); border-radius:2px;">HERO PHOTO — drop KV here</span>
    </div>
    <!-- SCRIM -->
    <div style="position:absolute; inset:0; background:linear-gradient(180deg, rgba(10,10,11,0.15) 0%, rgba(10,10,11,0.05) 35%, rgba(10,10,11,var(--scrim)) 100%);"></div>
  </div>

  <!-- NAV -->
  <header style="position:absolute; top:0; left:0; right:0; z-index:10; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:20px; padding:22px clamp(20px,4vw,56px); color:var(--fg);">
    <nav style="display:flex; gap:22px; font-family:var(--mono); font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--v); font-weight:500;">
      
      
      <a href="#" style="color:inherit; text-decoration:none;">IG</a>
      
      <a href="#" style="color:inherit; text-decoration:none;">EMAIL</a>
    </nav>
    <div style="display:flex; justify-content:center; align-items:center; font-family:var(--mono); font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:var(--mid);"></div>
    <div style="display:flex; justify-content:flex-end; align-items:center;">
      <button type="button" style="display:inline-flex; flex-direction:column; gap:5px; padding:6px; background:none; border:0; cursor:pointer;">
        <i style="display:block; width:26px; height:1.5px; background:var(--v);"></i>
        <i style="display:block; width:26px; height:1.5px; background:var(--v);"></i>
      </button>
    </div>
  </header>

  <!-- HERO CONTENT -->
  <div style="position:absolute; inset:0; z-index:2; padding:18vh clamp(28px,5vw,80px) 40vh; display:grid; grid-template-columns:1.4fr 1fr; align-items:center; gap:60px;">
    <div>
      <h1 style="font-family:var(--sans); font-weight:800; font-size:clamp(2.4rem,4.8vw,5.2rem); line-height:1.05; letter-spacing:-0.022em; color:var(--fg);">We design it.<br>We make it <span style="color:var(--v);">work.</span></h1>
      <p style="font-family: var(--jp); font-weight: 500; font-size: 26px; line-height: 1.85; margin-top: 22px; max-width: 36em; color: var(--mid); letter-spacing: 0.02em; word-break: keep-all; line-break: strict">つくる。そして、機能させる。</p>
      <div style="display:inline-flex; align-items:flex-start; gap:12px; margin-top:30px; font-family:var(--mono); font-weight:500; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--fg); max-width:36ch; line-height:1.5;">
        <span style="flex:none; margin-top:3px; width:11px; height:11px; border-radius:50%; border:1.5px solid var(--v); background:transparent;"></span>
        <span>Brand × AI Creative Studio</span>
      </div>
    </div>
    <div style="display:flex; justify-content:flex-end; align-items:flex-start; flex-direction:column; padding-top:4vh;">
      <p style="font-family: var(--mono); font-weight: 500; font-size: 18px; letter-spacing: 0.16em; line-height: 2.45; color: var(--mid); text-align: right; text-transform: uppercase; align-self: flex-end">KOBE<br>OSAKA<br>NAGOYA<br>TOKYO</p>
    </div>
  </div>

  <!-- BIG MORPHING WORDMARK -->
  <div style="position:absolute; left:0; right:0; bottom:-2.5vh; z-index:3; text-align:center; pointer-events:none; line-height:0.8;">
    <span style="font-family:var(--mark); font-weight:700; font-size:clamp(7rem,26vw,28rem); letter-spacing:-0.03em; color:var(--v); opacity:0.92;">UTUTU</span>
  </div>

  <!-- GRID OVERLAY -->
  <sc-if value="{{ showGrid }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute; inset:0; z-index:9; pointer-events:none; background:repeating-linear-gradient(to right, transparent 0, transparent calc(100%/12 - 1px), var(--line) calc(100%/12 - 1px), var(--line) calc(100%/12));"></div>
  </sc-if>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: &quot;100%&quot;, &quot;height&quot;: 760 },
  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#5FD0A8&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;scrim&quot;: { &quot;editor&quot;: &quot;float&quot;, &quot;default&quot;: 0.30, &quot;min&quot;: 0, &quot;max&quot;: 0.8, &quot;step&quot;: 0.05, &quot;tsType&quot;: &quot;number&quot; },
  &quot;showGrid&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot; }
}">
class Component extends DCLogic {
  applyVars() {
    const el = this.wrap;
    if (!el) return;
    const accent = this.props.accent ?? '#5FD0A8';
    el.style.setProperty('--v', accent);
    const hex = /^#([0-9a-f]{6})$/i.test(accent) ? accent + '38' : accent;
    el.style.setProperty('--v-glow', hex);
    el.style.setProperty('--scrim', String(this.props.scrim ?? 0.30));
  }
  componentDidMount() { this.applyVars(); }
  componentDidUpdate() { this.applyVars(); }
  renderVals() {
    return {
      setWrap: (el) => { this.wrap = el; this.applyVars(); },
      showGrid: this.props.showGrid ?? false,
    };
  }
}
</script>
</body>
</html>
